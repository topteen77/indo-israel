# Rollback: run previous app images (indo-israel-backend:previous, indo-israel-frontend:previous)
# Used by deploy.sh when health check fails. No build step.
services:
  nginx:
    image: indo-israel-nginx:latest
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
      - "${SSL_PORT:-9443}:9443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend

  backend:
    image: indo-israel-backend:previous
    environment:
      - PORT=5000
      - NODE_ENV=production

  frontend:
    image: indo-israel-frontend:previous
    environment:
      - NODE_ENV=production
